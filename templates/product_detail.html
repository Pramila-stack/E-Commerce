{% extends "base.html" %}
{% block content %}

<div class="row row-cols-1 row-cols-md-3 g-4">

  <div class="col">
    <div class="card h-100">
      <img src="{{ product.image.url }}" class="card-img-top" alt="..." width="350" height="350">
      <div class="card-body">
        <h5 class="card-title"><a href="" class="text-decoration-none fst-italic text-dark">{{ product.name }}</a></h5>
        <p class="card-text">{{ product.description }}</p>
        <p class="card-text"><strong>Price:</strong>{{ product.price }}</p>
        <p class="card-text"><strong>Category:</strong>{{ product.category }}</p>
        <p class="card-text"><strong>Stock:</strong>{{ product.stock }}</p>
        <a href="{% url 'add-cart' product.pk %}" class="btn btn-outline-secondary">Add To Cart</a>


      </div>
    </div>
  </div>


</div>
{% endblock content %}
